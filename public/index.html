<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ruteador</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--s1:#111;--s2:#1a1a1a;--bor:#222;
  --acc:#c8f542;--acc2:#42f5c8;--red:#ff4d4d;--txt:#f0f0f0;--mut:#555;
  --r:14px;--rr:10px
}
html,body{height:100%;overflow:hidden}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--txt);display:flex;flex-direction:column;max-width:430px;margin:0 auto}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px;flex-shrink:0}
.hdr-title{font-size:13px;font-weight:600;color:var(--acc);font-family:'JetBrains Mono',monospace;letter-spacing:.05em}
.hdr-sub{font-size:11px;color:var(--mut);margin-top:2px}
.gps-pill{display:flex;align-items:center;gap:6px;background:var(--s2);border:0.5px solid var(--bor);border-radius:20px;padding:5px 10px;font-size:10px;font-family:'JetBrains Mono',monospace}
.gps-dot{width:7px;height:7px;border-radius:50%;background:var(--mut);flex-shrink:0;transition:background .3s}
.gps-dot.on{background:var(--acc);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Pantalla inicial */
.screen{flex:1;overflow-y:auto;padding:0 18px 20px;display:flex;flex-direction:column;gap:10px}
.screen::-webkit-scrollbar{display:none}

.init-card{border:0.5px solid var(--bor);border-radius:var(--r);padding:24px 20px;text-align:center;background:var(--s1);margin-top:8px}
.init-icon{font-size:44px;margin-bottom:12px}
.init-title{font-size:17px;font-weight:600;color:var(--acc);margin-bottom:6px}
.init-sub{font-size:12px;color:var(--mut);line-height:1.6;margin-bottom:20px}

/* Upload zone */
.drop{border:1.5px dashed var(--bor);border-radius:var(--rr);padding:32px 16px;text-align:center;cursor:pointer;transition:all .2s;position:relative;background:var(--s2)}
.drop:hover,.drop.over{border-color:var(--acc);background:#111}
.drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{font-size:30px;margin-bottom:8px}
.drop-t1{font-size:14px;font-weight:500;color:var(--acc)}
.drop-t2{font-size:11px;color:var(--mut);margin-top:3px}
.file-info{display:none;align-items:center;gap:8px;padding:8px 12px;background:var(--s1);border:0.5px solid var(--bor);border-radius:8px;margin-top:8px;font-size:11px;color:var(--acc);font-family:'JetBrains Mono',monospace;word-break:break-all}
.file-info.show{display:flex}

/* Ciudad destino */
.dest-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin-top:6px;display:block}
select{width:100%;background:var(--s2);border:0.5px solid var(--bor);border-radius:8px;color:var(--txt);font-family:'Space Grotesk',sans-serif;font-size:13px;padding:9px 12px;appearance:none;cursor:pointer;margin-top:4px}
select:focus{outline:none;border-color:var(--acc)}

/* Status */
.st{background:var(--s2);border:0.5px solid var(--bor);border-radius:var(--rr);padding:11px 14px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--mut);line-height:1.6}
.st.ok{border-color:var(--acc);color:var(--acc)}
.st.err{border-color:var(--red);color:var(--red)}
.st.ld{border-color:var(--acc2);color:var(--acc2)}

/* Botón principal */
.btn-main{width:100%;padding:14px;border-radius:var(--rr);border:none;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;cursor:pointer;background:var(--acc);color:#0a0a0a;transition:all .15s}
.btn-main:hover:not(:disabled){background:#d4f55a;transform:translateY(-1px)}
.btn-main:disabled{background:#1a1a1a;color:var(--mut);cursor:not-allowed}

/* Ciudades detectadas */
.ciudades-card{background:var(--s1);border:0.5px solid var(--bor);border-radius:var(--rr);overflow:hidden}
.ciudades-title{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);padding:10px 14px 6px}
.ciudad-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-top:0.5px solid var(--bor)}
.ciudad-num{font-size:16px;font-weight:700;color:var(--acc);font-family:'JetBrains Mono',monospace;min-width:30px}
.ciudad-info{flex:1;margin-left:10px}
.ciudad-nombre{font-size:13px;font-weight:500}
.ciudad-meta{font-size:11px;color:var(--mut);margin-top:1px}
.ciudad-dist{font-size:11px;color:var(--mut);font-family:'JetBrains Mono',monospace}
.flecha{font-size:16px;color:var(--mut)}

/* Nav dinámica */
.quads-bar{display:flex;gap:4px;padding:0 18px 10px;flex-shrink:0}
.quad{flex:1;padding:5px 3px;border-radius:7px;text-align:center;border:0.5px solid var(--bor);transition:all .3s}
.quad .ql{font-size:8px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;opacity:.6}
.quad .qn{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:1px}
.quad.activo{border-color:currentColor;background:color-mix(in srgb,currentColor 12%,transparent)}
.quad.done{opacity:.35}

/* Card actual */
.card-actual{border-radius:var(--r);padding:16px;position:relative;overflow:hidden;flex-shrink:0}
.ca-badge{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.75;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.ca-badge::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:currentColor}
.ca-ciudad{font-size:10px;opacity:.6;margin-bottom:2px}
.ca-num{font-size:38px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1;margin-bottom:3px}
.ca-nombre{font-size:14px;font-weight:600;margin-bottom:3px}
.ca-dir{font-size:12px;opacity:.7}
.ca-tel{font-size:11px;opacity:.5;font-family:'JetBrains Mono',monospace;margin-top:2px}
.ca-bis{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.08);border-radius:5px;padding:2px 7px;font-size:9px;margin-top:6px}

/* Botones acción */
.btns{display:flex;gap:8px;flex-shrink:0}
.btn{flex:1;padding:13px;border-radius:var(--rr);border:none;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-maps{background:var(--acc);color:#0a0a0a}
.btn-maps:hover{background:#d4f55a}
.btn-ok{background:var(--s2);color:var(--txt);border:0.5px solid var(--bor)}
.btn-ok:hover{border-color:var(--acc2)}
.btn-ok:active{transform:scale(.97)}

/* Lista próximos */
.sec-t{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--mut)}
.lista{display:flex;flex-direction:column;gap:4px}
.item{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--s1);border:0.5px solid var(--bor);border-radius:var(--rr);transition:all .2s}
.item.next{border-color:var(--acc2);background:color-mix(in srgb,var(--acc2) 5%,transparent)}
.item-num{font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;min-width:26px;color:var(--mut)}
.item-info{flex:1}
.item-n{font-size:11px;font-weight:500}
.item-d{font-size:10px;color:var(--mut);margin-top:1px}
.item-m{font-size:10px;color:var(--mut);font-family:'JetBrains Mono',monospace;white-space:nowrap}
.item-bis{font-size:8px;background:var(--s2);border-radius:3px;padding:1px 4px;color:var(--mut);margin-left:4px}

/* Pendientes */
.pend-card{background:var(--s1);border:0.5px solid #2a1010;border-radius:var(--rr);padding:11px}
.pend-t{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--red);margin-bottom:7px}
.pend-row{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:0.5px solid var(--bor)}
.pend-row:last-child{border-bottom:none}
.pend-n{font-size:11px;font-weight:500}
.pend-d{font-size:10px;color:var(--mut);margin-top:1px}
.pend-tel{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--mut)}
.wa{display:inline-flex;align-items:center;gap:3px;background:#1a2a1a;color:#6fc;border-radius:4px;padding:2px 6px;font-size:9px;text-decoration:none;margin-top:3px}

/* Completo */
.completo{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;gap:10px;padding:20px}
.completo-icon{font-size:52px}
.completo-t{font-size:19px;font-weight:700;color:var(--acc)}
.completo-s{font-size:12px;color:var(--mut)}

/* Separador ciudad */
.ciudad-sep{background:var(--s2);border:0.5px solid var(--bor);border-radius:var(--rr);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.ciudad-sep-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ciudad-sep-t{font-size:12px;font-weight:600}
.ciudad-sep-s{font-size:10px;color:var(--mut);margin-top:1px}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--s2);border:0.5px solid var(--acc2);border-radius:9px;padding:9px 16px;font-size:12px;color:var(--acc2);transition:transform .3s;z-index:100;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
@keyframes spin{to{transform:rotate(360deg)}}
.sp{display:inline-block;width:11px;height:11px;border:2px solid var(--acc2);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:5px}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">/ ruteador /</div>
    <div class="hdr-sub" id="hdrSub">Subí el PDF para empezar</div>
  </div>
  <div class="gps-pill">
    <div class="gps-dot" id="gpsDot"></div>
    <span id="gpsLbl">GPS</span>
  </div>
</div>

<div class="quads-bar" id="quadsBar" style="display:none"></div>

<div class="screen" id="screen">

  <!-- PASO 1: Upload -->
  <div id="viewUpload">
    <div class="drop" id="drop">
      <input type="file" id="fileInput" accept=".pdf,.PDF">
      <div class="drop-icon">📄</div>
      <div class="drop-t1">Subir PDF de QuadMinds</div>
      <div class="drop-t2">Tocá acá o arrastrá el archivo</div>
    </div>
    <div class="file-info" id="fileInfo"><span>📎</span><span id="fileName"></span></div>

    <span class="dest-label">Ciudad donde terminás el día</span>
    <select id="destino">
      <option value="merlo">Merlo</option>
      <option value="marcos paz">Marcos Paz</option>
      <option value="lujan">Luján</option>
      <option value="cañuelas">Cañuelas</option>
      <option value="brandsen">Brandsen</option>
      <option value="la plata">La Plata</option>
      <option value="general rodriguez">General Rodríguez</option>
    </select>

    <div class="st" id="st" style="margin-top:8px">Esperando PDF...</div>
    <button class="btn-main" id="btnProcesar" disabled style="margin-top:8px" onclick="procesar()">
      Procesar PDF y calcular ruta
    </button>
  </div>

  <!-- PASO 2: Ciudades detectadas -->
  <div id="viewCiudades" style="display:none">
    <div class="ciudades-card" id="ciudadesCard"></div>
    <button class="btn-main" id="btnNavegar" style="margin-top:8px" onclick="iniciarNav()">
      Detectar ubicación y navegar
    </button>
  </div>

  <!-- PASO 3: Navegación dinámica -->
  <div id="viewNav" style="display:none;flex-direction:column;gap:9px"></div>

</div>

<div class="toast" id="toast"></div>

<script>
const OCR_KEY = "K87639511288957";
const COL_Q = {NE:'#378ADD',NO:'#1D9E75',SO:'#D85A30',SE:'#BA7517'};
const NOM_Q = {NE:'Nor-Este',NO:'Nor-Oeste',SO:'Sur-Oeste',SE:'Sur-Este'};
const BIS_SAL = {NE:49,NO:53,SO:38,SE:null};
const LAT_CUT=-34.069,LON_CUT=-60.104;

// Plantillas de ciudades conocidas
const PLANTILLAS = {
  'arrecifes': {
    coords:[-34.0667,-60.1000],
    cuadrantes:['NE','NO','SO','SE'],
    bisagras:{NE:null,NO:null,SO:null,SE:null}, // se calculan dinámicamente
    calles_prob:['bolivia y colombia','buenos aires 860','ecuador 736',
      'san martín 25','cordoba y belgrano','república de haití 344',
      'guyana casa','euskalerria','tucumán,arrecifes','lavalle y tucumán'],
  },
  'capitan sarmiento':{ coords:[-34.4667,-59.9833] },
  'cap. sarmiento':{ coords:[-34.4667,-59.9833] },
  'salto':{ coords:[-34.2933,-60.2536] },
  'carmen de areco':{ coords:[-34.3833,-59.8167] },
  'bragado':{ coords:[-35.1167,-60.4833] },
  '25 de mayo':{ coords:[-35.4333,-60.1833] },
  'las flores':{ coords:[-36.0167,-59.1000] },
  'cañuelas':{ coords:[-35.0500,-58.7667] },
  'brandsen':{ coords:[-35.1667,-58.2333] },
  'merlo':{ coords:[-34.6573,-58.7275] },
  'marcos paz':{ coords:[-34.7833,-58.8333] },
  'lujan':{ coords:[-34.5701,-59.1031] },
  'general rodriguez':{ coords:[-34.6059,-58.9614] },
};

let pdfFile=null, allPaquetes=[], allPendientes=[], ciudadesOrden=[];
let posLat=null, posLon=null;
let rutaTotal=[], idxActual=0, entregados=new Set();

// ── Upload ────────────────────────────────────────────────────────────────
const drop=document.getElementById('drop');
const fi=document.getElementById('fileInput');
drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('over')});
drop.addEventListener('dragleave',()=>drop.classList.remove('over'));
drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('over');if(e.dataTransfer.files[0])setFile(e.dataTransfer.files[0])});
fi.addEventListener('change',e=>{if(e.target.files[0])setFile(e.target.files[0])});

function setFile(f){
  pdfFile=f;
  document.getElementById('fileName').textContent=f.name;
  document.getElementById('fileInfo').classList.add('show');
  ss('✓ '+f.name,'ok');
  document.getElementById('btnProcesar').disabled=false;
}

function ss(m,t=''){
  const el=document.getElementById('st');
  el.innerHTML=t==='ld'?`<span class="sp"></span>${m}`:m;
  el.className='st '+(t==='ok'?'ok':t==='err'?'err':t==='ld'?'ld':'');
}

// ── Procesar PDF via OCR.space ────────────────────────────────────────────
async function procesar(){
  if(!pdfFile)return;
  document.getElementById('btnProcesar').disabled=true;
  ss('Extrayendo texto del PDF...','ld');

  try{
    const b64=await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>res(r.result.split(',')[1]);
      r.onerror=rej;
      r.readAsDataURL(pdfFile);
    });

    ss('Procesando con OCR...','ld');
    const fd=new FormData();
    fd.append('apikey',OCR_KEY);
    fd.append('language','spa');
    fd.append('OCREngine','2');
    fd.append('scale','true');
    fd.append('base64Image',`data:application/pdf;base64,${b64}`);

    const resp=await fetch('/.netlify/functions/ocr',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pdfBase64:b64})
    });
    const data=await resp.json();
    if(data.error) throw new Error(data.error);
    const texto=data.texto||'';
    ss('Analizando paquetes...','ld');

    const {paquetes, pendientes} = parsearTexto(texto);

    if(!paquetes.length){
      ss('No se encontraron paquetes. Intentá con las imágenes manualmente.','err');
      document.getElementById('btnProcesar').disabled=false;
      return;
    }

    allPaquetes=paquetes;
    allPendientes=pendientes;

    // Detectar ciudades y calcular orden
    const destino=document.getElementById('destino').value;
    ciudadesOrden=calcularOrdenCiudades(paquetes,destino);

    mostrarCiudades();

  }catch(err){
    ss('Error: '+err.message,'err');
    document.getElementById('btnProcesar').disabled=false;
  }
}

// ── Parser de texto OCR ───────────────────────────────────────────────────
function parsearTexto(texto){
  const lineas=texto.split('\n');
  const paquetes=[], pendientes=[];
  let i=0;

  while(i<lineas.length){
    const l=lineas[i].trim();
    // Buscar línea con número de paquete
    const m=l.match(/^(\d+)\s+(.+?)\s+(?:MLAR|1\.\d+E)/i)||
             l.match(/^(\d+)\s+([A-ZÁÉÍÓÚÑÜ][A-ZÁÉÍÓÚÑÜ\s]{3,})\s*$/);
    if(m){
      const num=parseInt(m[1]);
      const nombre=m[2].trim();
      let dir='', tel='';

      for(let j=i+1;j<Math.min(i+6,lineas.length);j++){
        const ll=lineas[j].trim();
        if(!ll)continue;
        if(ll.match(/^(\d+)\s+[A-Z]/))break;
        // Teléfono: solo dígitos
        if(!tel&&ll.match(/^\d{8,15}$/)&&!ll.match(/^\d{2}:\d{2}/)){
          tel=ll;continue;
        }
        // Dirección: contiene Argentina o Buenos Aires
        if(!dir&&(ll.includes('Argentina')||ll.includes('Buenos Aires')||ll.includes('Aires'))){
          dir=ll;continue;
        }
        // Dirección sin Argentina (línea con número de calle)
        if(!dir&&ll.match(/\d+/)&&ll.length>10&&!ll.match(/^\d{2}:\d{2}/)){
          const nxt=lineas[j+1]?.trim()||'';
          if(nxt.includes('Argentina')||nxt.includes('Buenos')){
            dir=ll+' '+nxt;continue;
          }
        }
      }

      if(nombre&&dir){
        const ciudad=detectarCiudad(dir);
        const prob=esProblematica(dir,ciudad);
        const entry={num,nombre,dir:dir.replace(/\s+/g,' ').trim(),tel,ciudad,prob};
        if(prob)pendientes.push(entry);
        else paquetes.push(entry);
      }
    }
    i++;
  }
  return{paquetes,pendientes};
}

function detectarCiudad(addr){
  const a=addr.toLowerCase();
  for(const c in PLANTILLAS){
    if(a.includes(c))return c;
  }
  return'desconocida';
}

function esProblematica(addr,ciudad){
  const a=addr.toLowerCase();
  if(!a.match(/\d/))return true; // sin número
  const prob=PLANTILLAS[ciudad]?.calles_prob||[];
  return prob.some(p=>a.includes(p));
}

// ── Calcular orden de ciudades ────────────────────────────────────────────
function calcularOrdenCiudades(paquetes,destino){
  const destCoords=PLANTILLAS[destino]?.coords||[-34.6573,-58.7275];
  
  // Agrupar por ciudad
  const ciudades={};
  for(const p of paquetes){
    if(!ciudades[p.ciudad])ciudades[p.ciudad]={paquetes:[],coords:PLANTILLAS[p.ciudad]?.coords||null};
    ciudades[p.ciudad].paquetes.push(p);
  }

  // Ordenar por distancia al destino (más lejos primero)
  return Object.entries(ciudades)
    .filter(([,d])=>d.coords)
    .sort(([,a],[,b])=>distM(...destCoords,...b.coords)-distM(...destCoords,...a.coords))
    .map(([nombre,data])=>({
      nombre,
      coords:data.coords,
      paquetes:data.paquetes,
      dist:Math.round(distM(...destCoords,...data.coords)),
    }));
}

// ── Mostrar ciudades ──────────────────────────────────────────────────────
function mostrarCiudades(){
  document.getElementById('viewUpload').style.display='none';
  const v=document.getElementById('viewCiudades');
  v.style.display='block';

  const destino=document.getElementById('destino').value;
  const total=allPaquetes.length+allPendientes.length;

  const card=document.getElementById('ciudadesCard');
  card.innerHTML=`<div class="ciudades-title">Ruta del día · ${total} paquetes</div>`+
    ciudadesOrden.map((c,i)=>`
      <div class="ciudad-row">
        <div class="ciudad-num">${i+1}</div>
        <div class="ciudad-info">
          <div class="ciudad-nombre">${c.nombre.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ')}</div>
          <div class="ciudad-meta">${c.paquetes.length} paquetes · ${c.dist}km de ${destino}</div>
        </div>
        <div class="flecha">→</div>
      </div>`).join('')+
    `<div class="ciudad-row">
      <div class="ciudad-num" style="color:var(--acc2)">🏠</div>
      <div class="ciudad-info">
        <div class="ciudad-nombre">${destino.charAt(0).toUpperCase()+destino.slice(1)}</div>
        <div class="ciudad-meta">Destino final</div>
      </div>
      <div class="flecha"></div>
    </div>`;
}

// ── Iniciar navegación ────────────────────────────────────────────────────
function iniciarNav(){
  document.getElementById('viewCiudades').style.display='none';
  document.getElementById('quadsBar').style.display='flex';
  document.getElementById('viewNav').style.display='flex';

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      posLat=pos.coords.latitude; posLon=pos.coords.longitude;
      document.getElementById('gpsDot').classList.add('on');
      document.getElementById('gpsLbl').textContent=`${posLat.toFixed(3)},${posLon.toFixed(3)}`;
      construirRuta();
    },()=>{
      posLat=ciudadesOrden[0]?.coords[0]||null;
      posLon=ciudadesOrden[0]?.coords[1]||null;
      construirRuta();
    });
  } else {
    posLat=ciudadesOrden[0]?.coords[0]||null;
    posLon=ciudadesOrden[0]?.coords[1]||null;
    construirRuta();
  }

  setInterval(()=>{
    if(navigator.geolocation)navigator.geolocation.getCurrentPosition(p=>{
      posLat=p.coords.latitude;posLon=p.coords.longitude;
      document.getElementById('gpsDot').classList.add('on');
      document.getElementById('gpsLbl').textContent=`${posLat.toFixed(3)},${posLon.toFixed(3)}`;
    });
  },30000);
}

function construirRuta(){
  // Para cada ciudad: usar plantilla de cuadrantes si existe, sino orden lineal
  rutaTotal=[];
  for(const ciudad of ciudadesOrden){
    const paq=ciudad.paquetes;
    if(PLANTILLAS[ciudad.nombre]?.cuadrantes){
      // Tiene plantilla → usar Dijkstra por cuadrantes
      // Por ahora orden lineal optimizado (futuro: Dijkstra completo)
      const opt=nnOptimizar(paq,posLat||ciudad.coords[0],posLon||ciudad.coords[1]);
      rutaTotal.push({ciudad:ciudad.nombre,paquetes:opt,tipo:'cuadrantes'});
    } else {
      const opt=nnOptimizar(paq,posLat||ciudad.coords[0],posLon||ciudad.coords[1]);
      rutaTotal.push({ciudad:ciudad.nombre,paquetes:opt,tipo:'lineal'});
    }
    if(rutaTotal[rutaTotal.length-1].paquetes.length){
      const ult=rutaTotal[rutaTotal.length-1].paquetes[rutaTotal[rutaTotal.length-1].paquetes.length-1];
      posLat=ult.lat||ciudad.coords[0]; posLon=ult.lon||ciudad.coords[1];
    }
  }
  idxActual=0;
  renderNav();
}

function nnOptimizar(paq,iLat,iLon){
  if(!paq.length)return[];
  let rest=[...paq],ruta=[],lat=iLat,lon=iLon;
  while(rest.length){
    const m=rest.reduce((a,b)=>{
      const da=distM(lat,lon,a.lat||iLat,a.lon||iLon);
      const db=distM(lat,lon,b.lat||iLat,b.lon||iLon);
      return db<da?b:a;
    });
    ruta.push(m);rest.splice(rest.indexOf(m),1);
    lat=m.lat||iLat;lon=m.lon||iLon;
  }
  return ruta;
}

// ── Render navegación ─────────────────────────────────────────────────────
function renderNav(){
  // Aplanar ruta para índice global
  const flatRuta=[];
  for(const bloque of rutaTotal)for(const p of bloque.paquetes)flatRuta.push({...p,ciudadBloque:bloque.ciudad});

  if(idxActual>=flatRuta.length){
    document.getElementById('quadsBar').style.display='none';
    document.getElementById('viewNav').innerHTML=`
      <div class="completo">
        <div class="completo-icon">🎉</div>
        <div class="completo-t">¡Ruta completa!</div>
        <div class="completo-s">${entregados.size} paquetes entregados.<br>¡Buen trabajo!</div>
      </div>
    `;
    renderPendientesNav();
    return;
  }

  const actual=flatRuta[idxActual];
  const proximos=flatRuta.slice(idxActual+1,idxActual+4);
  const col='#c8f542'; // color por defecto (sin cuadrante)

  document.getElementById('hdrSub').textContent=
    `${actual.ciudadBloque} · ${flatRuta.length-idxActual} restantes`;

  const nav=document.getElementById('viewNav');
  nav.innerHTML=`
    <div class="card-actual" style="background:color-mix(in srgb,${col} 8%,#111);border:0.5px solid ${col};color:${col}">
      <div class="ca-ciudad">${actual.ciudadBloque}</div>
      <div class="ca-badge">Próxima entrega</div>
      <div class="ca-num">${String(actual.num).padStart(2,'0')}</div>
      <div class="ca-nombre" style="color:#f0f0f0">${actual.nombre}</div>
      <div class="ca-dir" style="color:#f0f0f0">${actual.dir}</div>
      <div class="ca-tel">${actual.tel||'sin teléfono'}</div>
    </div>

    <div class="btns">
      <button class="btn btn-maps" onclick="abrirMaps('${actual.dir.replace(/'/g,"\\'")}')">📍 Abrir Maps</button>
      <button class="btn btn-ok" onclick="marcarEntregado()">✓ Entregado</button>
    </div>

    ${proximos.length?`
    <p class="sec-t">A continuación</p>
    <div class="lista">
      ${proximos.map((p,i)=>`
        <div class="item ${i===0?'next':''}">
          <div class="item-num">${String(p.num).padStart(2,'0')}</div>
          <div class="item-info">
            <div class="item-n">${p.nombre}</div>
            <div class="item-d">${p.dir}</div>
          </div>
        </div>`).join('')}
    </div>`:''}
  `;

  renderPendientesNav();
}

function renderPendientesNav(){
  if(!allPendientes.length)return;
  const nav=document.getElementById('viewNav');
  const div=document.createElement('div');
  div.className='pend-card';
  div.innerHTML=`<div class="pend-t">Sin dirección (${allPendientes.length})</div>`+
    allPendientes.map(p=>`
      <div class="pend-row">
        <div>
          <div class="pend-n">${p.num}. ${p.nombre}</div>
          <div class="pend-d">${p.dir}</div>
          ${p.tel?`<a class="wa" href="${waUrl(p.tel,p.nombre)}" target="_blank">WA ↗</a>`:''}
        </div>
        <div class="pend-tel">${p.tel||''}</div>
      </div>`).join('');
  nav.appendChild(div);
}

function abrirMaps(dir){
  const enc=a=>a.replace(/ /g,'+').replace(/,/g,'%2C');
  const url=posLat
    ?`https://www.google.com/maps/dir/?api=1&origin=${posLat},${posLon}&destination=${enc(dir)}&travelmode=driving`
    :`https://www.google.com/maps/search/?api=1&query=${enc(dir)}`;
  window.open(url,'_blank');
}

function marcarEntregado(){
  entregados.add(idxActual);
  idxActual++;
  if(navigator.geolocation)navigator.geolocation.getCurrentPosition(p=>{posLat=p.coords.latitude;posLon=p.coords.longitude;});
  toast(`✓ Entregado · ${rutaTotal.flatMap(b=>b.paquetes).length-idxActual} restantes`);
  renderNav();
}

function waUrl(tel,nombre){
  const p=tel.replace(/\D/g,'');
  const n=p.startsWith('0')?'54'+p.slice(1):p.startsWith('54')?p:'54'+p;
  return`https://wa.me/${n}?text=${encodeURIComponent(`Hola ${nombre.split(' ')[0]}! Hoy te llega un paquete de Shein. ¿Podés confirmarnos tu dirección con entrecalles? ¡Gracias! 📦`)}`;
}

function distM(la1,lo1,la2,lo2){
  const R=6371000,a=(la2-la1)*Math.PI/180,b=(lo2-lo1)*Math.PI/180;
  const c=Math.sin(a/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(b/2)**2;
  return R*2*Math.asin(Math.sqrt(c));
}

function toast(msg,dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}
</script>
